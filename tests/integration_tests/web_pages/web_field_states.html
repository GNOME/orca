<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orca Web Field States ready</title>
</head>
<body>
<h1>Field states</h1>
<p><label>Name <input type="text" required spellcheck="false"></label></p>
<p><label>Email <input type="text" aria-invalid="true" spellcheck="false"></label></p>
<p><label>Password <input type="password" aria-describedby="hint"></label>
<span id="hint">At least eight characters.</span></p>
<details>
<summary>More options</summary>
<p>Extra content.</p>
</details>
</body>
</html>
