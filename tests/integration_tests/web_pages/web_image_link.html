<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orca Web Image Link ready</title>
</head>
<body>
<h1>Image link</h1>
<p>Intro paragraph.</p>
<p><a href="https://example.com/home">Home page</a></p>
<p><a href="https://example.com/logo"><img src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='40'%20height='40'%3E%3Crect%20width='40'%20height='40'%20fill='red'/%3E%3C/svg%3E" width="40" height="40"></a></p>
<p><img src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='10'%20height='10'%3E%3Crect%20width='10'%20height='10'%20fill='blue'/%3E%3C/svg%3E" width="10" height="10"></p>
<p><img src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='40'%20height='40'%3E%3Crect%20width='40'%20height='40'%20fill='green'/%3E%3C/svg%3E" width="40" height="40"></p>
<p>Closing paragraph.</p>
<p><a href="https://example.com/cart"><span aria-label="Your shopping cart contains 0 items"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" aria-hidden="true"><rect width="24" height="24" fill="orange"></rect></svg></span></a></p>
</body>
</html>
