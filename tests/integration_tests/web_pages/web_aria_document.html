<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orca Web Aria Document ready</title>
</head>
<body>
<h1>Main heading one</h1>
<p>Paragraph before the document.</p>

<div role="document" aria-label="Embedded document">
  <h2>Document heading</h2>
  <p>Paragraph inside the document.</p>
  <button type="button">Document button</button>
  <input type="text" aria-label="Document entry">
</div>

<h1>Main heading two</h1>
<p>Paragraph after the document.</p>
</body>
</html>
