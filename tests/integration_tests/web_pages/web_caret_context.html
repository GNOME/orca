<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orca Web Caret Context ready</title>
</head>
<body>
<main>
<h1>Caret context</h1>
<p>Paragraph one.</p>
<p></p>
<p aria-hidden="true">Hidden paragraph.</p>
<span aria-hidden="true">Hidden span.</span>
<p>Paragraph three.</p>
<span aria-hidden="true" tabindex="0">Focusable hidden span.</span>
<p>Paragraph four.</p>
<label for="entry" style="position:absolute;left:-9999px">Off-screen label</label>
<input id="entry">
</main>
</body>
</html>
